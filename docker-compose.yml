services:
  pi-solar-system:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Wie oft (Sekunden) das Bild neu berechnet wird
      - REFRESH_SECONDS=${REFRESH_SECONDS:-60}
      # Bildgröße in Pixeln
      - WIDTH=${WIDTH:-134}
      - HEIGHT=${HEIGHT:-134}
    restart: unless-stopped
