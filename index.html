<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pi Solar System</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    img {
      image-rendering: pixelated;
      max-width: 90vw;
      max-height: 80vh;
      border: 1px solid #444;
    }
  </style>
</head>
<body>
  <h2>Pi Solar System</h2>
  <img id="pic" src="pisolar.png" alt="Solar System">
  <script>
    // Bild alle 10 Sekunden neu laden (Cache umgehen)
    setInterval(() => {
      document.getElementById('pic').src = 'pisolar.png?t=' + Date.now();
    }, 10000);
  </script>
</body>
</html>
